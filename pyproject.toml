[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "gym-dr"
version = "0.2.0"
requires-python = ">=3.10"
dependencies = [
  "stable-baselines3>=2.3",
  "tensorboard",
  "mlflow>=2.10",
  "optuna>=3.5",
]

[project.scripts]
gym-dr = "gym_dr.cli:main"

[tool.setuptools]
packages = ["gym_dr"]
